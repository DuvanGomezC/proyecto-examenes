<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sistema de Gestión de Exámenes — Instituto Araucano de Formación Técnica INARFOTEC">
  <title>INARFOTEC — Exámenes Académicos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <!-- Splash Screen -->
  <div id="splash" class="splash" role="status" aria-label="Cargando">
    <div class="splash__inner">
      <img src="assets/logo.png" alt="INARFOTEC" class="splash__logo" onerror="this.style.display='none'">
      <h1 class="splash__title">INARFOTEC</h1>
      <p class="splash__subtitle">Sistema de Gestión de Exámenes</p>
      <div class="splash__loader">
        <div class="splash__bar"></div>
      </div>
      <p class="splash__hint">Inicializando base de datos...</p>
    </div>
  </div>

  <!-- App Shell -->
  <div id="app" role="main" aria-live="polite"></div>

  <!-- App Modules (order matters: DB → Auth → PDF → UI) -->
  <script src="js/database.js?v=4"></script>
  <script src="js/auth.js?v=4"></script>
  <script src="js/pdf-gen.js?v=4"></script>
  <script src="js/anti-fraud.js?v=4"></script>
  <script src="js/ui-render.js?v=4"></script>

  <!-- Bootstrap: init DB then start router -->
  <script>
    (async function bootstrap() {
      const splash = document.getElementById('splash');
      try {
        await DB.init();
        splash?.remove();
        const user = Auth.getCurrentUser();
        const hash = window.location.hash;
        if (!hash || hash === '#' || hash === '#login') {
          window.location.hash = user
            ? (user.rol === 'Instructor' ? '#instructor-dashboard' : '#student-dashboard')
            : '#login';
        }
        window.dispatchEvent(new HashChangeEvent('hashchange'));
      } catch(err) {
        console.error('DB Init failed:', err);
        if (splash) {
          splash.innerHTML = '<div class="splash__inner"><div class="splash__error"><p>&#10060; Error al inicializar la base de datos.</p><small>' + err.message + '</small></div></div>';
        }
      }
    })();
  </script>
</body>
</html>
